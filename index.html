<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLCKSMTH — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --surface: #181818;
      --red: #c0001a;
      --white: #f0f0f0;
      --muted: #888;
      --divider: #2a2a2a;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
      overflow-x: hidden;
    }

    /* ── Keyframes ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes expandLine {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    @keyframes redGlow {
      0%, 100% { text-shadow: 0 0 0px transparent; }
      50%       { text-shadow: 0 0 40px rgba(192, 0, 26, 0.35); }
    }

    /* ── Header ── */
    header {
      padding: 48px 32px 32px;
      border-bottom: 1px solid var(--divider);
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 14vw, 88px);
      color: var(--red);
      letter-spacing: 0.04em;
      line-height: 1;
      animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both,
                 redGlow 4s ease-in-out 1s infinite;
    }

    .tagline {
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 6px;
      animation: fadeIn 0.8s ease both 0.45s;
    }

    /* ── Sections ── */
    .menu-section {
      padding: 36px 32px 0;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .section-label.visible { opacity: 1; }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--divider);
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;
    }

    .section-label.visible::after { transform: scaleX(1); }

    /* ── Menu items ── */
    .item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--divider);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .item:last-child { border-bottom: none; }

    .item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .item-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(22px, 5.5vw, 30px);
      letter-spacing: 0.05em;
      color: var(--white);
    }

    .item-price {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--muted);
      white-space: nowrap;
      margin-left: 12px;
    }

    .item-price::before {
      content: '₹';
      font-size: 11px;
      margin-right: 1px;
    }

    /* ── Add-ons ── */
    .addons {
      margin: 36px 32px 0;
      background: var(--surface);
      border-radius: 8px;
      padding: 20px 24px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .addons.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .addons-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .addon-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 7px 0;
      border-bottom: 1px solid var(--divider);
    }

    .addon-item:last-child { border-bottom: none; }

    .addon-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
    }

    .addon-price {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .addon-price::before { content: '+₹'; font-size: 10px; margin-right: 1px; }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #444;
      text-transform: uppercase;
      animation: fadeIn 1s ease both 1.2s;
    }

    /* ── Clickable items ── */
    .item { cursor: pointer; }
    .item .item-name { transition: color 0.2s ease; }
    .item:hover .item-name { color: var(--red); }

    /* ── Drink Overlay ── */
    .drink-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drink-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .drink-modal { text-align: center; user-select: none; }

    .drink-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.08em;
      color: var(--red);
      margin-bottom: 28px;
    }

    /* ── Cup scene ── */
    .cup-scene {
      position: relative;
      width: 220px;
      margin: 0 auto;
    }

    .drop-rain {
      height: 130px;
      overflow: hidden;
      position: relative;
    }

    .cup-wrapper {
      position: relative;
      width: 220px;
    }

    .cup-rim {
      width: 158px;
      height: 10px;
      background: #252525;
      border-radius: 5px 5px 0 0;
      margin: 0 auto;
    }

    .cup-body {
      width: 140px;
      height: 112px;
      background: #0d0d0d;
      border: 2px solid #252525;
      border-top: none;
      border-radius: 0 0 22px 22px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
    }

    .cup-liquid {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 0;
      border-radius: 0 0 20px 20px;
    }

    .cup-handle {
      position: absolute;
      right: 15px;
      top: 14px;
      width: 30px;
      height: 46px;
      border: 3px solid #252525;
      border-left: none;
      border-radius: 0 16px 16px 0;
    }

    /* ── Drops ── */
    .drop {
      position: absolute;
      top: 0;
    }

    .drop-coffee {
      width: 10px;
      height: 14px;
      background: radial-gradient(ellipse at 40% 30%, #5c300f, #200a02);
      border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
      animation: dropFall 0.52s cubic-bezier(0.55, 0, 0.85, 0.5) forwards;
    }

    .drop-milk {
      width: 11px;
      height: 14px;
      background: radial-gradient(ellipse at 40% 30%, #f0ece2, #ccc8b4);
      border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
      animation: dropFall 0.52s cubic-bezier(0.55, 0, 0.85, 0.5) forwards;
    }

    .drop-ice {
      width: 14px;
      height: 12px;
      background: linear-gradient(135deg, rgba(215,240,255,0.95), rgba(155,205,235,0.85));
      border-radius: 2px;
      box-shadow: inset 1px 1px 3px rgba(255,255,255,0.6);
      animation: dropFallIce 0.52s cubic-bezier(0.55, 0, 0.85, 0.5) forwards;
    }

    @keyframes dropFall {
      0%   { transform: translateY(0) scaleY(1.2); opacity: 1; }
      78%  { transform: translateY(108px) scaleY(1.1); opacity: 1; }
      90%  { transform: translateY(116px) scaleY(0.5) scaleX(1.5); opacity: 0.7; }
      100% { transform: translateY(120px) scaleY(0) scaleX(2.5); opacity: 0; }
    }

    @keyframes dropFallIce {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      78%  { transform: translateY(108px) rotate(55deg); opacity: 1; }
      90%  { transform: translateY(116px) rotate(75deg) scaleY(0.6) scaleX(1.3); opacity: 0.7; }
      100% { transform: translateY(120px) rotate(90deg) scaleY(0) scaleX(2); opacity: 0; }
    }

    .drink-close-hint {
      margin-top: 44px;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: #383838;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">BLCKSMTH</div>
    <div class="tagline">Coffee Menu</div>
  </header>

  <!-- Hot Espresso -->
  <section class="menu-section">
    <div class="section-label">Espresso</div>
    <div class="item"><span class="item-name">Double Espresso</span><span class="item-price" data-price="250">250</span></div>
    <div class="item"><span class="item-name">Americano</span><span class="item-price" data-price="250">250</span></div>
    <div class="item"><span class="item-name">Cortado</span><span class="item-price" data-price="275">275</span></div>
    <div class="item"><span class="item-name">Cappuccino</span><span class="item-price" data-price="300">300</span></div>
    <div class="item"><span class="item-name">Flat White</span><span class="item-price" data-price="300">300</span></div>
    <div class="item"><span class="item-name">Latte</span><span class="item-price" data-price="300">300</span></div>
  </section>

  <!-- Iced -->
  <section class="menu-section">
    <div class="section-label">Iced</div>
    <div class="item"><span class="item-name">Iced Double Espresso</span><span class="item-price" data-price="250">250</span></div>
    <div class="item"><span class="item-name">Iced Americano</span><span class="item-price" data-price="250">250</span></div>
    <div class="item"><span class="item-name">Iced Latte</span><span class="item-price" data-price="300">300</span></div>
  </section>

  <!-- Cold -->
  <section class="menu-section">
    <div class="section-label">Cold</div>
    <div class="item"><span class="item-name">Cold Brew</span><span class="item-price" data-price="320">320</span></div>
    <div class="item"><span class="item-name">Cold Coffee</span><span class="item-price" data-price="330">330</span></div>
  </section>

  <!-- Add-ons -->
  <div class="addons">
    <div class="addons-label">Milk Add-ons</div>
    <div class="addon-item"><span class="addon-name">Almond Milk</span><span class="addon-price">90</span></div>
    <div class="addon-item"><span class="addon-name">Oat Milk</span><span class="addon-price">90</span></div>
  </div>

  <footer>All prices in ₹ &nbsp;·&nbsp; Taxes excluded</footer>

  <!-- Drink Animation Overlay -->
  <div id="drink-overlay" class="drink-overlay" onclick="closeDrinkOverlay()">
    <div class="drink-modal">
      <div class="drink-title" id="drink-title"></div>
      <div class="cup-scene">
        <div class="drop-rain" id="drop-rain"></div>
        <div class="cup-wrapper">
          <div class="cup-rim"></div>
          <div class="cup-body">
            <div class="cup-liquid" id="cup-liquid"></div>
          </div>
          <div class="cup-handle"></div>
        </div>
      </div>
      <div class="drink-close-hint">tap anywhere to close</div>
    </div>
  </div>

  <script>
    // Stagger siblings inside a parent when any one enters view
    function staggerChildren(entries, observer) {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const siblings = entry.target.parentElement.querySelectorAll('.item');
        siblings.forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 60);
        });
        observer.unobserve(entry.target);
      });
    }

    // Reveal single elements
    function revealSingle(entries, observer) {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      });
    }

    // Count up price when item becomes visible
    function countUp(el) {
      const target = parseInt(el.dataset.price, 10);
      const duration = 500;
      const step = 16;
      const increment = target / (duration / step);
      let current = 0;
      const timer = setInterval(() => {
        current = Math.min(current + increment, target);
        el.textContent = Math.round(current);
        if (current >= target) clearInterval(timer);
      }, step);
    }

    const itemObserver   = new IntersectionObserver(staggerChildren, { threshold: 0.15 });
    const singleObserver = new IntersectionObserver(revealSingle,    { threshold: 0.2  });

    // Observe first item of each section to trigger the stagger
    document.querySelectorAll('.menu-section').forEach(section => {
      const first = section.querySelector('.item');
      if (first) itemObserver.observe(first);
    });

    // Section labels
    document.querySelectorAll('.section-label').forEach(el => singleObserver.observe(el));

    // Add-ons card
    singleObserver.observe(document.querySelector('.addons'));

    // Price count-up — trigger when item becomes visible
    const priceObserver = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const priceEl = entry.target.querySelector('[data-price]');
        if (priceEl) countUp(priceEl);
        obs.unobserve(entry.target);
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('.item').forEach(el => priceObserver.observe(el));

    // ── Drink click animation ──────────────────────────────────────
    const DRINK_CONFIG = {
      'Double Espresso':      { drops:[['coffee',4]],                        liquidColor:'#1c0903' },
      'Americano':            { drops:[['coffee',4]],                        liquidColor:'#1c0a04' },
      'Cortado':              { drops:[['coffee',2],['milk',2]],             liquidColor:'#4a2210' },
      'Cappuccino':           { drops:[['coffee',2],['milk',3]],             liquidColor:'#5a2e14' },
      'Flat White':           { drops:[['coffee',2],['milk',2]],             liquidColor:'#4e2612' },
      'Latte':                { drops:[['coffee',2],['milk',3]],             liquidColor:'#6a3820' },
      'Iced Double Espresso': { drops:[['ice',3],['coffee',2]],              liquidColor:'#1c0903' },
      'Iced Americano':       { drops:[['ice',3],['coffee',2]],              liquidColor:'#1c0a04' },
      'Iced Latte':           { drops:[['ice',2],['coffee',2],['milk',2]],   liquidColor:'#5a2c14' },
      'Cold Brew':            { drops:[['ice',3],['coffee',3]],              liquidColor:'#100602' },
      'Cold Coffee':          { drops:[['ice',2],['coffee',2],['milk',2]],   liquidColor:'#4a2010' },
    };

    function createDrop(rain, type) {
      const drop = document.createElement('div');
      drop.className = 'drop drop-' + type;
      drop.style.left = (40 + Math.random() * 120) + 'px';
      rain.appendChild(drop);
    }

    function openDrinkOverlay(name) {
      const config = DRINK_CONFIG[name];
      if (!config) return;

      document.getElementById('drink-title').textContent = name;

      const liquid = document.getElementById('cup-liquid');
      const rain   = document.getElementById('drop-rain');

      rain.innerHTML = '';
      liquid.style.cssText = 'background:' + config.liquidColor + ';height:0;transition:none;border-radius:0 0 20px 20px;';

      const allDrops = config.drops.flatMap(([t, n]) => Array(n).fill(t));
      allDrops.forEach((type, i) => {
        setTimeout(() => createDrop(rain, type), i * 190);
      });

      setTimeout(() => {
        liquid.style.cssText = 'background:' + config.liquidColor + ';height:72%;transition:height 1.5s cubic-bezier(0.25,1,0.5,1);border-radius:0 0 20px 20px;';
      }, 350);

      document.getElementById('drink-overlay').classList.add('open');
    }

    function closeDrinkOverlay() {
      document.getElementById('drink-overlay').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDrinkOverlay();
    });

    document.querySelectorAll('.item').forEach(item => {
      const name = item.querySelector('.item-name').textContent.trim();
      item.addEventListener('click', () => openDrinkOverlay(name));
    });
  </script>

</body>
</html>
